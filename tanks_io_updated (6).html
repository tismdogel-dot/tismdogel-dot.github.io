<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tanks.io</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #b2b2b2; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { background: rgba(0, 0, 0, 0.6); color: white; padding: 15px; border-radius: 8px; pointer-events: auto; }
        
        #start-screen, #shop-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.4); z-index: 50; pointer-events: auto;
        }
        
        .start-box {
            background: rgba(0, 0, 0, 0.85); padding: 40px; border-radius: 10px;
            text-align: center; border: 4px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 350px;
        }
        .start-box h1 { color: #00b894; margin-top: 0; font-size: 40px; text-shadow: 2px 2px 0 #000; margin-bottom: 10px; }
        
        #save-stats {
            background: rgba(0,0,0,0.5); border-radius: 8px; padding: 10px; margin-bottom: 20px;
            font-size: 18px; color: #fff; border: 2px solid #555;
        }
        .highlight-stat { color: #f1c40f; font-weight: bold; }
        .gem-stat { color: #00cec9; font-weight: bold; }

        .start-box input {
            padding: 12px; font-size: 18px; border-radius: 5px; border: 2px solid #555;
            background: #222; color: white; outline: none; margin-bottom: 15px; text-align: center; width: 250px;
            box-sizing: border-box;
        }
        .start-box input:focus { border-color: #00b894; }
        
        .btn {
            padding: 12px; font-size: 20px; font-weight: bold; cursor: pointer;
            color: white; border: 3px solid #000; border-radius: 5px; transition: 0.2s; width: 100%; margin-bottom: 10px;
        }
        .btn-play { background: #00b894; }
        .btn-play:hover { background: #55efc4; transform: scale(1.05); }
        .btn-shop { background: #0984e3; }
        .btn-shop:hover { background: #74b9ff; transform: scale(1.05); }
        .btn-clear-save { background: #d63031; font-size: 14px; padding: 8px; margin-top: 10px; display: none; }
        .btn-clear-save:hover { background: #ff7675; }

        /* --- SHOP UI --- */
        #shop-screen { display: none; flex-direction: column; }
        .shop-box {
            background: rgba(0, 0, 0, 0.9); padding: 30px; border-radius: 10px;
            border: 4px solid #0984e3; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 850px; max-width: 95%; max-height: 85%; overflow-y: auto; text-align: center;
        }
        .shop-box h1 { color: #00cec9; margin-top: 0; font-size: 36px; text-shadow: 2px 2px 0 #000; }
        .shop-header-stats { font-size: 24px; color: white; margin-bottom: 5px; }
        
        #shop-error-msg {
            color: #ff7675; font-weight: bold; font-size: 18px; min-height: 24px;
            margin-bottom: 15px; opacity: 0; transition: opacity 0.3s ease;
        }

        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .shop-item {
            background: #2d3436; border: 3px solid #555; border-radius: 8px; padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .shop-item h3 { margin: 0 0 10px 0; color: white; }
        
        .shop-item-canvas {
            background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 10px;
        }
        
        .shop-btn {
            padding: 8px 15px; font-size: 16px; font-weight: bold; border-radius: 5px; border: 2px solid #000; cursor: pointer; width: 100%; transition: 0.2s;
        }
        .btn-buy { background: #f1c40f; color: black; }
        .btn-buy:hover { background: #ffeaa7; }
        .btn-unlocked { background: #636e72; color: white; cursor: default; }
        
        .btn-close { background: #d63031; margin-top: 20px; width: auto; padding: 10px 40px; }
        .btn-close:hover { background: #ff7675; transform: scale(1.05); }

        /* --- GAME UI --- */
        #game-ui { display: none; width: 100%; height: 100%; }
        
        #info-panel { position: absolute; top: 20px; left: 20px; text-align: left; min-width: 180px; }
        #combat-status { color: #2ecc71; font-weight: bold; margin-top: 8px; font-size: 14px; }
        
        #stats-panel { position: absolute; bottom: 65px; left: 5px; display: flex; flex-direction: column; gap: 5px; }
        .stat-row { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .stat-row:hover { color: #f1c40f; }
        .stat-bar { width: 100px; height: 12px; background: #333; border: 2px solid #555; border-radius: 4px; overflow: hidden; }
        .stat-fill { height: 100%; background: #f1c40f; transition: width 0.2s; }
        
        #gem-display {
            position: absolute; bottom: 5px; left: 5px;
            background: rgba(0,0,0,0.7); border: 2px solid #00cec9; border-radius: 8px;
            padding: 5px 15px; font-size: 22px; font-weight: bold; color: white;
            display: flex; align-items: center; gap: 8px; pointer-events: auto;
        }
        .gem-icon { font-size: 24px; filter: drop-shadow(0 0 5px #00cec9); }

        #xp-bar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 400px; height: 20px; background: #333; border: 3px solid #555; border-radius: 10px; overflow: hidden; }
        #xp-fill { height: 100%; background: #2ecc71; width: 0%; transition: width 0.3s; }
        .overlay-text { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-weight: bold; color: #333; text-shadow: 1px 1px 0 #fff; }
        
        #upgrade-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 15px;
            display: none; flex-direction: column; align-items: center; pointer-events: auto;
            border: 4px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #upgrade-menu h1 { color: #fff; margin-top: 0; margin-bottom: 20px; text-align: center; }
        .upgrade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .upgrade-btn {
            background: #2d3436; color: white; border: 3px solid; padding: 15px 20px;
            font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; min-width: 120px;
        }
        .upgrade-btn:hover { filter: brightness(1.3); transform: scale(1.05); }
        
        #hide-upgrade-menu {
            margin-top: 25px; background: #e74c3c; color: white; font-weight: bold;
            border: 2px solid #fff; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.2s;
        }
        #hide-upgrade-menu:hover { background: #c0392b; transform: scale(1.05); }

        #evolution-toggle {
            position: absolute; top: 20px; right: 20px; display: none; 
            background: #9b59b6; color: white; border: 3px solid #333; 
            padding: 10px 20px; font-weight: bold; font-size: 16px; border-radius: 8px; 
            cursor: pointer; z-index: 10; transition: 0.2s; pointer-events: auto;
        }
        #evolution-toggle:hover { background: #8e44ad; transform: scale(1.05); }

        #kill-feed {
            position: absolute; top: 70px; right: 20px; pointer-events: none;
            display: flex; flex-direction: column; gap: 8px; z-index: 100; align-items: flex-end;
        }
        .kill-msg {
            background: rgba(0,0,0,0.7); color: #55efc4; padding: 10px 15px; 
            border-radius: 5px; border-left: 5px solid #00b894; font-weight: bold; font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: slideInFadeOut 3s forwards;
        }

        #action-message {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-size: 45px; font-weight: bold; color: white; text-shadow: 3px 3px 0 #000;
            display: none; pointer-events: none; z-index: 200; text-align: center;
        }

        @keyframes slideInFadeOut { 
            0% { opacity: 0; transform: translateX(50px); } 
            10% { opacity: 1; transform: translateX(0); } 
            80% { opacity: 1; transform: translateX(0); } 
            100% { opacity: 0; transform: translateY(-20px); } 
        }

    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="start-screen">
        <div class="start-box">
            <h1>tanks.io</h1>
            <div id="save-stats">
                High Score: <span id="ui-high-score" class="highlight-stat">0</span><br>
                Gems: <span class="gem-icon">💎</span> <span id="ui-gems" class="gem-stat">0</span>
            </div>
            <input type="text" id="player-name-input" placeholder="Enter Name" autocomplete="off" maxlength="15">
            <input type="text" id="room-name-input" placeholder="Server Code" autocomplete="off" maxlength="20" value="public">
            <button id="play-btn" class="btn btn-play">Play</button>
            <button id="open-shop-btn" class="btn btn-shop">Tank Shop</button>
            <button id="clear-save-btn" class="btn btn-clear-save">Delete Saved Level</button>
        </div>
    </div>

    <div id="shop-screen">
        <div class="shop-box">
            <h1>Tank Evolution Shop</h1>
            <div class="shop-header-stats">
                Your Gems: <span class="gem-icon">💎</span> <span id="shop-gems" class="gem-stat">0</span>
            </div>
            <div id="shop-error-msg"></div>
            <div class="shop-grid" id="shop-grid">
                </div>
            <button id="close-shop-btn" class="btn btn-close">Back</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="info-panel" class="panel">
            <h2 id="tank-name" style="margin: 0 0 5px 0;">Basic Tank</h2>
            <div id="tank-level">Level 1</div>
            <div id="upgrade-points" style="color: #f1c40f; font-weight: bold; margin-top: 5px;">Upgrade Points: 0</div>
            <div id="combat-status">Combat: SAFE</div>
        </div>
        
        <div id="kill-feed"></div>
        <div id="action-message">Saving lvls... 3</div>

        <button id="evolution-toggle">Evolution Available!</button>

        <div id="upgrade-menu">
            <h1 id="upgrade-menu-title">Choose a Class:</h1>
            <div class="upgrade-grid" id="upgrade-buttons"></div>
            <button id="hide-upgrade-menu">Hide Menu</button>
        </div>
        
        <div id="stats-panel" class="panel"></div>
        
        <div id="gem-display">
            <span class="gem-icon">💎</span> <span id="ingame-gems-count">0</span>
        </div>

        <div id="xp-bar-container">
            <div class="overlay-text" id="score-text">Score: 0</div>
            <div id="xp-fill"></div>
        </div>
    </div>
</div>

<script>
// --- DATA & SAVE SYSTEM ---
const SAVE_KEY = 'diepRemakeSave';

let globalData = {
    highScore: 0,
    gems: 0,
    unlockedTanks: ['Basic'],
    savedTank: null 
};

const SHOP_ITEMS = [
    { id: 'Octagon', price: 500 },
    { id: 'Spikey', price: 1000 },
    { id: 'Buckshot', price: 1500 },
    { id: 'Barrage', price: 2000 },
    { id: 'Freezer', price: 2500 },
    { id: 'Machine', price: 2500 },
    { id: 'Divider', price: 3000 },
    { id: 'Destroyer', price: 4000 },
{ id: 'Big Shot', price: 2000 },
{ id: 'Ultra Tank', price: 20000 },
{ id: 'Scatter', price: 12500 }
];

const SHOP_ITEM_IDS = SHOP_ITEMS.map(i => i.id);

function loadGameData() {
    let maxGems = 0;
    let maxScore = 0;
    let bestTanks = ['Basic'];
    let bestSavedLevel = null;

    const keysToCheck = ['diepRemakeSave', 'diepRemakeSave_v1', 'diepRemakeSave_v2'];
    
    keysToCheck.forEach(key => {
        const saved = localStorage.getItem(key);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if ((parsed.gems || 0) > maxGems) maxGems = parsed.gems;
                if ((parsed.highScore || 0) > maxScore) maxScore = parsed.highScore;
                
                if (parsed.unlockedTanks) {
                    parsed.unlockedTanks.forEach(t => {
                        if (!bestTanks.includes(t)) bestTanks.push(t);
                    });
                }
                
                if (parsed.savedTank && typeof parsed.savedTank.level === 'number' && bestSavedLevel === null) {
                    bestSavedLevel = parsed.savedTank.level;
                }
            } catch (e) {
                console.error("Error parsing save key:", key);
            }
        }
    });

    globalData.gems = maxGems;
    globalData.highScore = maxScore;
    globalData.unlockedTanks = bestTanks;
    globalData.savedTank = bestSavedLevel !== null ? { level: bestSavedLevel } : null;
    
    updateStartScreenUI();
    
    saveGameData();
    localStorage.removeItem('diepRemakeSave_v1');
    localStorage.removeItem('diepRemakeSave_v2');
}

function saveGameData() {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
        highScore: globalData.highScore,
        gems: globalData.gems,
        unlockedTanks: globalData.unlockedTanks,
        savedTank: globalData.savedTank
    }));
    updateStartScreenUI();
}

function updateStartScreenUI() {
    document.getElementById('ui-high-score').textContent = Math.floor(globalData.highScore);
    document.getElementById('ui-gems').textContent = globalData.gems;
    document.getElementById('shop-gems').textContent = globalData.gems;
    document.getElementById('ingame-gems-count').textContent = globalData.gems;
    
    let clearBtn = document.getElementById('clear-save-btn');
    if (globalData.savedTank) {
        clearBtn.style.display = 'block';
        clearBtn.textContent = `Delete Saved Level (Lvl ${globalData.savedTank.level})`;
    } else {
        clearBtn.style.display = 'none';
    }
}

document.getElementById('clear-save-btn').addEventListener('click', () => {
    globalData.savedTank = null;
    saveGameData();
    localStorage.removeItem('diepRemakeSave_v1');
    localStorage.removeItem('diepRemakeSave_v2');
});

loadGameData();

function sanitizeRoomCode(raw) {
    return (raw || 'public')
        .toLowerCase()
        .replace(/[^a-z0-9_-]/g, '')
        .slice(0, 20) || 'public';
}

function netPost(message) {
    if (!netChannel) return;
    netChannel.postMessage({
        ...message,
        room: netRoomCode,
        from: netClientId
    });
}

function ensureRemoteTank(id, payload = {}) {
    if (remotePlayers.has(id)) return remotePlayers.get(id);

    const tank = new RemoteTank(payload.x || 0, payload.y || 0, payload.name || 'Guest', id);
    tank.networkId = id;
    tank.lastSeen = Date.now();
    remotePlayers.set(id, tank);
    return tank;
}

function syncLocalPlayerState(force = false) {
    if (!netChannel || !player || player.dead || gameState !== 'PLAYING') return;

    const now = Date.now();
    if (!force && now - lastNetStateSend < 70) return;
    lastNetStateSend = now;

    netPost({
        type: 'state',
        name: player.name,
        x: player.x,
        y: player.y,
        vx: player.vx,
        vy: player.vy,
        angle: player.angle,
        level: player.level,
        xp: player.xp,
        score: player.score,
        upgradePoints: player.upgradePoints,
        upgradeTier: player.upgradeTier,
        className: player.className,
        stats: [...player.stats],
        hp: player.hp,
        maxHp: player.maxHp,
        barrelIndex: player.barrelIndex,
        alpha: player.alpha,
        dead: player.dead
    });
}

function broadcastLocalShot(firedBarrelIndex) {
    if (!netChannel || !player || player.dead || gameState !== 'PLAYING') return;
    netPost({
        type: 'shot',
        name: player.name,
        x: player.x,
        y: player.y,
        vx: player.vx,
        vy: player.vy,
        angle: player.angle,
        level: player.level,
        xp: player.xp,
        score: player.score,
        upgradePoints: player.upgradePoints,
        upgradeTier: player.upgradeTier,
        className: player.className,
        stats: [...player.stats],
        hp: player.hp,
        maxHp: player.maxHp,
        barrelIndex: firedBarrelIndex,
        alpha: player.alpha
    });
}

function startNetworkSession() {
    stopNetworkSession();
    remotePlayers.clear();
    netRoomCode = sanitizeRoomCode(roomNameInput ? roomNameInput.value : 'public');
    netChannel = new BroadcastChannel(`${NETWORK_CHANNEL_PREFIX}${netRoomCode}`);

    netChannel.onmessage = (event) => {
        const msg = event.data || {};
        if (msg.room !== netRoomCode || msg.from === netClientId) return;

        if (msg.type === 'leave') {
            remotePlayers.delete(msg.from);
            return;
        }

        if (msg.type === 'state' || msg.type === 'shot') {
            const remote = ensureRemoteTank(msg.from, msg);
            remote.lastSeen = Date.now();
            remote.applyNetState(msg);

            if (msg.type === 'shot') {
                remote.barrelIndex = typeof msg.barrelIndex === 'number' ? msg.barrelIndex : remote.barrelIndex;
                remote.lastShot = performance.now();
                remote.shoot();
            }
        }
    };

    netPost({
        type: 'hello',
        name: playerNameInput ? playerNameInput.value || 'Player' : 'Player',
        x: 0, y: 0,
        level: 1, xp: 0, score: 0,
        upgradePoints: 0, upgradeTier: 0,
        className: 'Basic',
        stats: [0,0,0,0,0,0,0,0],
        hp: 100, maxHp: 100,
        barrelIndex: 0,
        alpha: 1
    });
}

function stopNetworkSession() {
    if (netChannel) {
        try { netPost({ type: 'leave' }); } catch (e) {}
        try { netChannel.close(); } catch (e) {}
    }
    netChannel = null;
}

window.addEventListener('beforeunload', stopNetworkSession);

// --- SHOP LOGIC ---
const startScreen = document.getElementById('start-screen');
const shopScreen = document.getElementById('shop-screen');
const shopGrid = document.getElementById('shop-grid');

document.getElementById('open-shop-btn').addEventListener('click', () => {
    startScreen.style.display = 'none';
    shopScreen.style.display = 'flex';
    renderShop();
});

document.getElementById('close-shop-btn').addEventListener('click', () => {
    shopScreen.style.display = 'none';
    startScreen.style.display = 'flex';
});

function renderShop() {
    shopGrid.innerHTML = '';
    
    SHOP_ITEMS.forEach(item => {
        const config = TANK_CLASSES[item.id];
        if (!config) return;

        const isUnlocked = globalData.unlockedTanks.includes(item.id);

        const el = document.createElement('div');
        el.className = 'shop-item';
        el.style.borderColor = config.color;

        let buttonHTML = isUnlocked 
            ? `<button class="shop-btn btn-unlocked" disabled>Unlocked</button>`
            : `<button class="shop-btn btn-buy" onclick="buyTank('${item.id}', ${item.price})">Unlock (💎 ${item.price})</button>`;

        el.innerHTML = `
            <h3>${config.name}</h3>
            <canvas id="shop-canvas-${item.id}" width="100" height="100" class="shop-item-canvas"></canvas>
            ${buttonHTML}
        `;
        shopGrid.appendChild(el);
    });

    requestAnimationFrame(() => {
        SHOP_ITEMS.forEach(item => {
            const c = document.getElementById('shop-canvas-' + item.id);
            if(c) {
                const ctx = c.getContext('2d');
                ctx.save();
                ctx.translate(c.width/2, c.height/2);
                
                let dummy = new Tank(0,0,true); 
                dummy.setClass(item.id);
                dummy.color = TANK_CLASSES[item.id].color; 
                dummy.alpha = 1;
                dummy.name = ""; 
                dummy.hp = dummy.maxHp; 
                dummy.draw(ctx);
                
                ctx.restore();
            }
        });
    });
}

window.buyTank = function(id, price) {
    if (globalData.gems >= price) {
        globalData.gems -= price;
        globalData.unlockedTanks.push(id);
        saveGameData();
        renderShop();
    } else {
        let errMsg = document.getElementById('shop-error-msg');
        errMsg.textContent = "Not enough gems!";
        errMsg.style.opacity = 1;
        setTimeout(() => errMsg.style.opacity = 0, 2500);
    }
}

// --- GAME LOGIC ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const MAP_SIZE = 8000;
const MAX_SHAPES = 1000;
const MAX_BOTS = 0;
const COMBAT_TIMER_MAX = 15; 

let gameState = 'START'; 
const playerNameInput = document.getElementById('player-name-input');
const roomNameInput = document.getElementById('room-name-input');

const NETWORK_CHANNEL_PREFIX = 'tanks-io-room-';
let netChannel = null;
let netClientId = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
let netRoomCode = 'public';
let lastNetStateSend = 0;
let lastNetCleanup = 0;
let remotePlayers = new Map();

// ---------------------------------
const BOT_NAMES = ['[MG]Spin2Team', 'SniperKing', 'ProGamer', 'lag', 'hello', 'noob', 'Destroyer', 'Player1', 'TankMaster', 'GitGud', 'Anonymous', 'Fighter', 'Overlord', 'Arena Closer', 'John', 'Oof', 'TryHard'];

const TANK_CLASSES = {
    'Basic': { name: 'Basic Tank', color: '#00b894', shape: 'circle', barrels: [{x:0, y:0, w:35, h:15, angle:0}], reloadMod: 1.0, dmgMod: 1.0, hasRecoil: false },
    'Double': { name: 'Double', color: '#0984e3', shape: 'circle', fireType: 'offset', barrels: [{x:0, y:-10, w:35, h:12, angle:0}, {x:0, y:10, w:35, h:12, angle:0}], reloadMod: 0.5, dmgMod: 0.7, hasRecoil: false },
    'Side Shooter': { name: 'Side Shooter', color: '#6c5ce7', shape: 'circle', fireType: 'simultaneous', barrels: [{x:0, y:0, w:35, h:15, angle:0}, {x:0, y:0, w:30, h:15, angle: Math.PI, back: true}], reloadMod: 1.0, dmgMod: 1.0, hasRecoil: false },
    'Sniper': { name: 'Sniper', color: '#27ae60', shape: 'circle', barrels: [{x:0, y:0, w:50, h:12, angle:0}], reloadMod: 2.5, dmgMod: 2.5, speedMod: 0.9, bulletSpeed: 1.8, bulletLife: 1.5, hasRecoil: true, penMod: 2.5 },
    'Minigun': { name: 'Minigun', color: '#e17055', shape: 'circle', barrels: [{x:0, y:0, w:35, h:22, angle:0}], reloadMod: 0.4, dmgMod: 0.7, spread: 0.25, hasRecoil: true },
    'Rammer': { name: 'Rammer', color: '#b2bec3', shape: 'square', hpMod: 2.5, rammer: true, rammerCanShoot: false, ramDamage: 250, bodyDamage: 18, speedMod: 1.2, barrels: [], hasRecoil: false },

const STAT_NAMES = ['Health Regen', 'Max Health', 'Tank Speed', 'Bullet Speed', 'Bullet Penetration', 'Bullet Damage', 'Reload', 'Body Damage'];
const STAT_COLORS = ['#e67e22', '#e74c3c', '#3498db', '#f1c40f', '#f39c12', '#c0392b', '#2ecc71', '#8e44ad'];
const HP_STAT_BONUS = 0.35;
const BODY_DAMAGE_TICK_MS = 100;

function getBodyDamageValue(tank) {
    if (!tank || !tank.config) return 6;
    const bodyStat = tank.stats && typeof tank.stats[7] === 'number' ? tank.stats[7] : 0;
    const base = typeof tank.config.bodyDamage === 'number' ? tank.config.bodyDamage : (tank.config.rammer ? 18 : 6);
    return base * (1 + bodyStat * 0.45);
}

function canDealBodyDamage(source, target, now) {
    if (!source || !target) return false;
    if (!source.lastBodyDamageTimes) source.lastBodyDamageTimes = {};
    const key = String(target.entityId || target.networkId || target.name || 'target');
    const last = source.lastBodyDamageTimes[key] || 0;
    if (now - last < BODY_DAMAGE_TICK_MS) return false;
    source.lastBodyDamageTimes[key] = now;
    return true;
}


function getXpNeeded(level) {
    return Math.floor(20 * level + Math.pow(Math.max(0, level - 10), 2) * 1.5);
}

function showKillMessage(targetName) {
    if (typeof targetName !== 'string') return;
    const cleanName = targetName.trim();
    if (!cleanName || cleanName.toLowerCase() === 'undefined') return;

    const feed = document.getElementById('kill-feed');
    const msg = document.createElement('div');
    msg.className = 'kill-msg';
    msg.textContent = `Eliminated ${cleanName}! (+100 💎)`;
    feed.appendChild(msg);
    setTimeout(() => { if (msg.parentNode === feed) feed.removeChild(msg); }, 3000);
}

function updateUI() {
    if (gameState !== 'PLAYING' || !player) return;
    
    document.getElementById('tank-name').textContent = player.config.name;
    document.getElementById('tank-level').textContent = `Level ${player.level}`;
    document.getElementById('score-text').textContent = `Score: ${Math.floor(player.score)}`;
    document.getElementById('upgrade-points').textContent = `Upgrade Points: ${player.upgradePoints}`;
    document.getElementById('ingame-gems-count').textContent = globalData.gems;
    
    let xpNeeded = getXpNeeded(player.level);
    let percent = Math.min(100, (player.xp / xpNeeded) * 100);
    document.getElementById('xp-fill').style.width = `${percent}%`;
}

function checkPlayerUpgrades() {
    if (!player || player.dead || gameState !== 'PLAYING') return;
    
    if (document.getElementById('upgrade-menu').style.display === 'flex') return;
    if (document.getElementById('evolution-toggle').style.display === 'block') return;

    let availableUpgrades = null;
    let targetTier = 0;

    if (player.level >= 15 && player.upgradeTier === 0) {
        availableUpgrades = UPGRADE_TREE[15];
        targetTier = 1;
    } else if (player.level >= 30 && player.upgradeTier === 1) {
        availableUpgrades = UPGRADE_TREE[30][player.className];
        targetTier = 2;
    } else if (player.level >= 45 && player.upgradeTier === 2) {
        availableUpgrades = UPGRADE_TREE[45][player.className];
        targetTier = 3;
    } else if (player.level >= 60 && player.upgradeTier === 3) {
        availableUpgrades = UPGRADE_TREE[60][player.className];
        targetTier = 4;
    }


    if (targetTier > 0) {
        if (availableUpgrades && availableUpgrades.length > 0) {
            let filteredUpgrades = availableUpgrades.filter(cls => {
                if (SHOP_ITEM_IDS.includes(cls)) return globalData.unlockedTanks.includes(cls);
                return true; 
            });

            if (filteredUpgrades.length > 0) {
                showUpgradeMenu(filteredUpgrades, targetTier);
            } else {
                player.upgradeTier = targetTier;
                checkPlayerUpgrades(); 
            }
        } else {
            player.upgradeTier = targetTier;
            checkPlayerUpgrades();
        }
    }
}

let NEXT_ENTITY_ID = 1;

class Entity {
    constructor(x, y, radius, color) {
        this.entityId = NEXT_ENTITY_ID++;
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.radius = radius;
        this.color = color;
        this.hp = 100;
        this.maxHp = 100;
        this.dead = false;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.9; this.vy *= 0.9; 
        
        if (this.x < -MAP_SIZE/2) this.x = -MAP_SIZE/2;
        if (this.x > MAP_SIZE/2) this.x = MAP_SIZE/2;
        if (this.y < -MAP_SIZE/2) this.y = -MAP_SIZE/2;
        if (this.y > MAP_SIZE/2) this.y = MAP_SIZE/2;

        if(this.hp <= 0) this.dead = true;
    }
}

class Tank extends Entity {
    constructor(x, y, isBot = false, tankType = 'Basic') {
        const botColors = ['#d63031', '#fdcb6e', '#e84393', '#00cec9', '#6c5ce7'];
        let startColor = isBot ? botColors[Math.floor(Math.random() * botColors.length)] : '#00b894';
        
        super(x, y, 20, startColor);
let stats = TANK_CLASSES[tankType];
        this.recoilMod = stats.recoilMod || 1.0;
        this.isBot = isBot;
        this.name = isBot ? BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)] : "";
        this.angle = 0;
        this.baseColor = startColor;
        this.stats = [0, 0, 0, 0, 0, 0, 0, 0];
        
        this.setClass('Basic');
        
        this.upgradePoints = 0; 
        this.level = 1;
        this.xp = 0;
        this.score = 0;
        this.upgradeTier = 0; 
        this.lastShot = 0;
        this.barrelIndex = 0;
        this.recoilOffset = 0;
        
        this.lastDamageTime = 0; 
        this.lastHealTick = 0;  
        this.lastBodyDamageTimes = {};   
        
        this.stillTimer = 0;
        this.alpha = 1;
        this.slowTimer = 0; 

        this.autoAngles = [0,0,0,0,0];
        this.lastAutoShots = [0,0,0,0,0];
        
        this.intent = { up: false, down: false, left: false, right: false, aimAngle: 0, shoot: false };
    }

    setClass(className) {
        this.className = className;
        this.config = TANK_CLASSES[className];
        if (!this.isBot) this.color = this.config.color || '#00b894';
        else this.color = this.baseColor; 
        
        let oldMax = this.maxHp;
        this.maxHp = 100 * (this.config.hpMod || 1) * (1 + this.stats[1] * HP_STAT_BONUS);
        this.hp = (this.hp / oldMax) * this.maxHp; 
        
        if (!this.isBot && gameState === 'PLAYING') updateUI();
    }

    getStatMultiplier(statIndex) { return 1 + (this.stats[statIndex] * 0.2); }

    addXp(amount) {
        this.xp += amount;
        this.score += amount;
        let xpNeeded = getXpNeeded(this.level);
        let leveledUp = false;
        
        while(this.xp >= xpNeeded) {
            this.level++;
            this.xp -= xpNeeded;
            leveledUp = true;
            
            if (this.level <= 30) {
                this.upgradePoints++;
            }
            
            if (this.isBot && this.upgradePoints > 0) {
                let randomStat = Math.floor(Math.random() * 8);
                if(this.stats[randomStat] < 8) { 
                    this.stats[randomStat]++; 
                    this.upgradePoints--; 
                    if (randomStat === 1) {
                        this.maxHp = 100 * (this.config.hpMod || 1) * (1 + this.stats[1] * HP_STAT_BONUS);
                    }
                }
            }
            xpNeeded = getXpNeeded(this.level); 
        }

        if (this.isBot) {
            if (this.level >= 15 && this.upgradeTier === 0) {
                this.setClass(UPGRADE_TREE[15][Math.floor(Math.random() * UPGRADE_TREE[15].length)]);
                this.upgradeTier = 1;
            }
            if (this.level >= 30 && this.upgradeTier === 1 && UPGRADE_TREE[30][this.className]) {
                let nextPath = UPGRADE_TREE[30][this.className];
                if (nextPath && nextPath.length > 0) this.setClass(nextPath[Math.floor(Math.random() * nextPath.length)]);
                this.upgradeTier = 2;
            }
            if (this.level >= 45 && this.upgradeTier === 2 && UPGRADE_TREE[45][this.className]) {
                let nextPath = UPGRADE_TREE[45][this.className];
                if (nextPath && nextPath.length > 0) this.setClass(nextPath[Math.floor(Math.random() * nextPath.length)]);
                this.upgradeTier = 3;
            }
        } else if (leveledUp) {
            checkPlayerUpgrades();
        }
    }

    update() {
        if (this.hp < this.maxHp) {
            if (performance.now() - this.lastDamageTime > 4000) {
                if (performance.now() - this.lastHealTick > 500) { 
                    let healChunk = this.maxHp * (0.005 + (this.stats[0] * 0.01));
                    this.hp += healChunk;
                    if (this.hp > this.maxHp) this.hp = this.maxHp;
                    this.lastHealTick = performance.now();
                }
            }
        }

        let speed = 2.5 * (this.config.speedMod || 1) * (1 + this.stats[2] * 0.05);

        if (this.slowTimer > 0) {
            speed *= 0.3;
            this.slowTimer--;
        }
        
        let moveX = 0, moveY = 0;
        if(this.intent.up) moveY -= 1;
        if(this.intent.down) moveY += 1;
        if(this.intent.left) moveX -= 1;
        if(this.intent.right) moveX += 1;

        if (moveX !== 0 || moveY !== 0) {
            let len = Math.hypot(moveX, moveY);
            this.vx += (moveX / len) * speed * 0.2;
            this.vy += (moveY / len) * speed * 0.2;
            
            this.stillTimer = 0;
            this.alpha = 1;
        } else {
            if (this.config.invisible && !this.intent.shoot) {
                this.stillTimer++;
                if (this.stillTimer > 120) this.alpha = Math.max(0.15, this.alpha - 0.05);
            } else {
                this.stillTimer = 0;
                this.alpha = 1;
            }
        }

        this.angle = this.intent.aimAngle;
        let reloadTime = 30 * (this.config.reloadMod || 1) / this.getStatMultiplier(6);
        
        if (this.intent.shoot && !this.config.rammerCanShoot && !this.config.rammer && this.config.barrels && this.config.barrels.length > 0) {
            this.stillTimer = 0;
            this.alpha = 1;
            if (performance.now() - this.lastShot > reloadTime * 16) {
              this.shoot();
                this.lastShot = performance.now();
                // Applied the new stat!
               this.recoilOffset = (5 + (this.config.recoil || 0)) * (this.config.recoilMod || 1.0);
            } // <-- ADDED THIS CLOSING BRACKET
        } // <-- ADDED THIS CLOSING BRACKET

if (this.config.autoTurrets || this.config.autoTurret) {
            let turrets = this.config.autoTurrets || [{x:0, y:0}];
            let target = null;
            let minDist = Infinity;
            
            let enemies = this.isBot ? bots.filter(b => b!==this && !b.dead && b.alpha > 0.3) : bots.filter(b => !b.dead && b.alpha > 0.3);
            if (this.isBot && !player.dead && player.alpha > 0.3) enemies.push(player);
            
            enemies.forEach(e => {
                let d = Math.hypot(e.x - this.x, e.y - this.y);
                if (d < minDist && d < 600) { minDist = d; target = e; }
            });
            if (!target) {
                shapes.forEach(s => {
                    let d = Math.hypot(s.x - this.x, s.y - this.y);
                    if (d < minDist && d < 600) { minDist = d; target = s; }
                });
            }

            turrets.forEach((t, i) => {
                let rotX = Math.cos(this.angle)*t.x - Math.sin(this.angle)*t.y;
                let rotY = Math.sin(this.angle)*t.x + Math.cos(this.angle)*t.y;
                let absX = this.x + rotX;
                let absY = this.y + rotY;

                if (target) {
                    this.autoAngles[i] = Math.atan2(target.y - absY, target.x - absX);
                    if (performance.now() - (this.lastAutoShots[i]||0) > 180 * (this.config.reloadMod||1)) { 
                        let spawnX = absX + Math.cos(this.autoAngles[i]) * 20;
                        let spawnY = absY + Math.sin(this.autoAngles[i]) * 20;
                        let bDmg = 5 * this.getStatMultiplier(5) * (this.config.dmgMod||1);
                        let bSpeed = 7 * this.getStatMultiplier(3);
                        let b = new Bullet(spawnX, spawnY, this.autoAngles[i], bSpeed, bDmg, 1, 5, this.color, this, false, 1);
                        bullets.push(b);
                        this.lastAutoShots[i] = performance.now();
                    }
                } else {
                    this.autoAngles[i] = (this.autoAngles[i] || 0) + 0.02; 
                }
            });
        }

        if (this.recoilOffset > 0) this.recoilOffset -= 1;
        super.update();
    }

    shoot() {
        let barrels = this.config.barrels;
        let firedBarrelIndex = this.barrelIndex;
        let toShoot = this.config.fireType === 'simultaneous' ? barrels : [barrels[this.barrelIndex]];
        let speedMult = this.getStatMultiplier(2); 
        
        toShoot.forEach(b => {
            let bAngle = this.angle + (b.angle || 0);
            let spread = (Math.random() - 0.5) * (this.config.spread || 0.05);
            bAngle += spread;

            let spawnX = this.x + Math.cos(this.angle) * (b.x||0) - Math.sin(this.angle) * (b.y||0);
            let spawnY = this.y + Math.sin(this.angle) * (b.x||0) + Math.cos(this.angle) * (b.y||0);
            spawnX += Math.cos(bAngle) * b.w;
            spawnY += Math.sin(bAngle) * b.w;

            let bSpeed = 7 * (this.config.bulletSpeed || 1) * this.getStatMultiplier(3);
            
            let barrelDmgMod = b.dmgMod !== undefined ? b.dmgMod : (this.config.dmgMod || 1);
            let bDmg = 10 * barrelDmgMod * this.getStatMultiplier(5);
            
            let bSize = 8 * (b.bulletSize || this.config.bulletSize || 1);
            let bPen = (1 + this.stats[4]) * (this.config.penMod || 1); 

            bullets.push(new Bullet(spawnX, spawnY, bAngle, bSpeed, bDmg, bPen, bSize, this.config.bulletColor || this.color, this, this.config.freezes, this.config.bulletLife || 1));
            
          if (b.backThrust) {
                // Multiplied by this.recoilMod!
                this.vx -= Math.cos(bAngle) * (b.backThrust * speedMult * this.recoilMod);
                this.vy -= Math.sin(bAngle) * (b.backThrust * speedMult * this.recoilMod);
            } else if(b.back || this.config.backThrust) {
                // Multiplied by this.recoilMod!
                let thrust = (this.config.backThrust || 1) * speedMult * this.recoilMod;
                this.vx += Math.cos(this.angle) * thrust;
                this.vy += Math.sin(this.angle) * thrust;
            } else if (this.config.hasRecoil) {
                // Multiplied by this.recoilMod!
                this.vx -= Math.cos(bAngle) * (0.5 * speedMult * this.recoilMod);
                this.vy -= Math.sin(bAngle) * (0.5 * speedMult * this.recoilMod);
            }
        });
        this.barrelIndex = (this.barrelIndex + 1) % barrels.length;
        if (this === player) broadcastLocalShot(firedBarrelIndex);
    }

    drawShape(ctx) {
        ctx.fillStyle = this.color; ctx.lineWidth = 4; ctx.strokeStyle = '#333'; ctx.beginPath();
        if(this.config.shape === 'square') {
            ctx.rect(-18, -18, 36, 36);
        } else if(this.config.shape === 'hexagon') {
            for(let i=0; i<6; i++) ctx.lineTo(24*Math.cos(i*Math.PI/3), 24*Math.sin(i*Math.PI/3));
            ctx.closePath();
        } else {
            ctx.arc(0, 0, this.radius, 0, Math.PI*2);
        }
        ctx.fill(); ctx.stroke();
    }

    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.alpha; 
        
        ctx.save();
        ctx.translate(this.x - Math.cos(this.angle)*this.recoilOffset, this.y - Math.sin(this.angle)*this.recoilOffset);
        ctx.rotate(this.angle);

        ctx.fillStyle = '#95a5a6'; ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
        if(this.config.barrels) {
            this.config.barrels.forEach(b => {
                ctx.save(); ctx.translate(b.x || 0, b.y || 0); ctx.rotate(b.angle || 0);
                ctx.fillRect(0, -b.h/2, b.w, b.h); ctx.strokeRect(0, -b.h/2, b.w, b.h);
                ctx.restore();
            });
        }
        this.drawShape(ctx);
        ctx.restore();

        if (this.config.autoTurrets || this.config.autoTurret) {
            let turrets = this.config.autoTurrets || [{x:0, y:0}];
            turrets.forEach((t, i) => {
                ctx.save();
                let rotX = Math.cos(this.angle)*t.x - Math.sin(this.angle)*t.y;
                let rotY = Math.sin(this.angle)*t.x + Math.cos(this.angle)*t.y;
                ctx.translate(this.x + rotX, this.y + rotY);
                ctx.rotate(this.autoAngles[i] || 0);
                ctx.fillStyle = '#95a5a6'; ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
                ctx.fillRect(0, -6, 20, 12); ctx.strokeRect(0, -6, 20, 12);
                ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fillStyle = this.color; ctx.fill(); ctx.stroke();
                ctx.restore();
            });
        }

        if (this.alpha > 0.5) {
            if (this.name) {
                ctx.fillStyle = '#333'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(`${this.name} - Lvl ${this.level}`, this.x, this.y - 30);
            }
            if(this.hp < this.maxHp) {
                ctx.fillStyle = '#333'; ctx.fillRect(this.x - 25, this.y + 30, 50, 6);
                ctx.fillStyle = '#2ecc71'; ctx.fillRect(this.x - 25, this.y + 30, 50 * (this.hp/this.maxHp), 6);
            }
        }
        
        ctx.restore();
    }
}

class RemoteTank extends Tank {
    constructor(x, y, name = 'Guest', networkId = '') {
        super(x, y, false, 'Basic');
        this.networkId = networkId;
        this.isRemote = true;
        this.name = name || 'Guest';
        this.alpha = 1;
        this.intent = { up: false, down: false, left: false, right: false, aimAngle: 0, shoot: false };
    }

    update() {
        if (this.dead) return;
    }

    applyNetState(state) {
        if (!state) return;
        if (typeof state.x === 'number') this.x = state.x;
        if (typeof state.y === 'number') this.y = state.y;
        if (typeof state.vx === 'number') this.vx = state.vx;
        if (typeof state.vy === 'number') this.vy = state.vy;
        if (typeof state.angle === 'number') this.angle = state.angle;
        if (typeof state.alpha === 'number') this.alpha = state.alpha;
        if (typeof state.name === 'string' && state.name) this.name = state.name;

        if (Array.isArray(state.stats)) this.stats = [...state.stats];
        if (typeof state.className === 'string' && state.className) this.setClass(state.className);

        if (typeof state.level === 'number') this.level = state.level;
        if (typeof state.xp === 'number') this.xp = state.xp;
        if (typeof state.score === 'number') this.score = state.score;
        if (typeof state.upgradePoints === 'number') this.upgradePoints = state.upgradePoints;
        if (typeof state.upgradeTier === 'number') this.upgradeTier = state.upgradeTier;
        if (typeof state.maxHp === 'number') this.maxHp = state.maxHp;
        if (typeof state.hp === 'number') this.hp = state.hp;
        if (typeof state.barrelIndex === 'number') this.barrelIndex = state.barrelIndex;
        if (state.dead === true) this.dead = true;
        this.lastSeen = Date.now();
    }
}

class Player extends Tank {
    constructor(x, y) { 
        super(x, y, false); 
        this.lastCombatTime = 0;
        this.resetState = 0; 
        this.resetStartTime = 0;
        this.autoShoot = false;
        this.autoRotate = false;
        
    }
    update() {
        if (gameState === 'PLAYING') {
            this.intent.up = keys['w']; this.intent.down = keys['s'];
            this.intent.left = keys['a']; this.intent.right = keys['d'];
            
            this.intent.shoot = mouse.down || this.autoShoot;

            if (this.autoRotate) {
                this.intent.aimAngle += 0.05; 
            } else {
                let dx = (mouse.x - canvas.width/2) + camera.x - this.x;
                let dy = (mouse.y - canvas.height/2) + camera.y - this.y;
                this.intent.aimAngle = Math.atan2(dy, dx);
            }
            
            let timeSinceCombat = (performance.now() - this.lastCombatTime) / 1000;
            let combatTimerLeft = Math.max(0, COMBAT_TIMER_MAX - timeSinceCombat);
            let statusText = document.getElementById('combat-status');
            
            if (this.lastCombatTime === 0 || combatTimerLeft === 0) {
                statusText.textContent = "Combat: SAFE";
                statusText.style.color = "#2ecc71";
            } else {
                statusText.textContent = `Combat: ${Math.ceil(combatTimerLeft)}s`;
                statusText.style.color = "#e74c3c";
            }

            if (this.resetState === 1 && combatTimerLeft > 0) {
                this.resetState = 2; 
            }

            let msgBox = document.getElementById('action-message');
            if (this.resetState > 0) {
                let elapsed = (performance.now() - this.resetStartTime) / 1000;
                let timeLeft = Math.ceil(3 - elapsed);
                
                msgBox.style.display = 'block';
                if (this.resetState === 1) {
                    msgBox.textContent = `Saving lvls... ${timeLeft}`;
                    msgBox.style.color = '#55efc4';
                } else {
                    msgBox.textContent = `Resetting in ${timeLeft}`;
                    msgBox.style.color = '#ff7675';
                }
                
                if (elapsed >= 3) {
                    msgBox.style.display = 'none';
                    if (this.resetState === 1) {
                        globalData.savedTank = {
                            level: this.level
                        };
                    } else {
                        globalData.savedTank = null;
                    }
                    saveGameData();
                    this.dead = true; 
                }
            } else {
                msgBox.style.display = 'none';
            }

        } else {
            this.intent.up = this.intent.down = this.intent.left = this.intent.right = this.intent.shoot = false;
        }
        super.update();
        syncLocalPlayerState();
    }
}

class Bullet extends Entity {
    constructor(x, y, angle, speed, damage, pen, size, color, owner, freezes, lifeMult) {
        super(x, y, size, color);
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.damage = damage;
        this.pen = pen; 
        this.owner = owner;
        this.maxLife = 80 * (lifeMult || 1); 
        this.life = this.maxLife;
        this.freezes = freezes;
        this.hitEntities = new Set(); 
    }
    update() {
        this.x += this.vx; this.y += this.vy;

        const lifeRatio = this.maxLife > 0 ? this.life / this.maxLife : 0;
        if (lifeRatio < 0.3) {
            const endDrag = 0.92 + (lifeRatio / 0.3) * 0.06;
            this.vx *= endDrag;
            this.vy *= endDrag;
        }

        this.life--;
        if(this.life <= 0 || this.pen <= 0) this.dead = true;
    }
    draw(ctx) {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fillStyle = this.color; ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = '#333'; ctx.stroke();
    }
}

class Shape extends Entity {
    constructor(x, y, type) {
        super(x, y, type==='square'?15:type==='triangle'?18:25, 
            type==='square'?'#ffeaa7':type==='triangle'?'#fab1a0':'#74b9ff');
        this.type = type;
        this.maxHp = type==='square'?20:type==='triangle'?40:100;
        this.hp = this.maxHp;
        this.xpValue = type==='square'?50:type==='triangle'?100:250;
        this.angle = Math.random() * Math.PI;
        this.rotSpeed = (Math.random() - 0.5) * 0.05;
    }
    update() {
        super.update();
        this.angle += this.rotSpeed;
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
        ctx.fillStyle = this.color; ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
        ctx.beginPath();
        if(this.type === 'square') ctx.rect(-15, -15, 30, 30);
        else if(this.type === 'triangle') { ctx.moveTo(18,0); ctx.lineTo(-9,15); ctx.lineTo(-9,-15); ctx.closePath(); }
        else if(this.type === 'pentagon') { for(let i=0;i<5;i++) { ctx.lineTo(25*Math.cos(i*2*Math.PI/5), 25*Math.sin(i*2*Math.PI/5)); } ctx.closePath(); }
        ctx.fill(); ctx.stroke(); ctx.restore();
        
        if(this.hp < this.maxHp) {
            ctx.fillStyle = '#333'; ctx.fillRect(this.x - 15, this.y + 25, 30, 4);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(this.x - 15, this.y + 25, 30 * (this.hp/this.maxHp), 4);
        }
    }
}

    const combatTimerLeft = Math.max(0, COMBAT_TIMER_MAX - timeSinceCombat);

    if (player.lastCombatTime !== 0 && combatTimerLeft > 0) {

    };

function upgradeStat(index) {
    if(player.upgradePoints > 0 && player.stats[index] < 8) {
        player.stats[index]++; 
        player.upgradePoints--;
        
        if(index === 1) {
            player.maxHp = 100 * (player.config.hpMod || 1) * (1 + player.stats[1] * HP_STAT_BONUS)
        }
        
        document.getElementById(`stat-fill-${index}`).style.width = `${(player.stats[index]/8)*100}%`;
        updateUI();
    }
}

function checkCollisions(tanksArray) {
    tanksArray.forEach(tank => {
        bullets.forEach(b => {
            if (b.dead || b.owner === tank) return; 
            if (b.hitEntities.has(tank)) return;

            let dx = tank.x - b.x; let dy = tank.y - b.y;
            if(Math.sqrt(dx*dx + dy*dy) < tank.radius + b.radius) {
                tank.hp -= b.damage; 
                tank.lastDamageTime = performance.now(); 
                b.pen -= 1; 
                b.hitEntities.add(tank);
                
                if (tank === player) player.lastCombatTime = performance.now();
                if (b.owner === player) player.lastCombatTime = performance.now();

                if (b.freezes) tank.slowTimer = 120;

                if(b.pen <= 0) b.dead = true;
                
                if(tank.hp <= 0 && !tank.dead) {
                    tank.dead = true;
                    b.owner.addXp(Math.max(Math.floor(tank.score), 50)); 
                    
                    if (b.owner === player) {
                        globalData.gems += 100;
                        saveGameData();
                        updateUI();
                        showKillMessage(tank.name);
                    }
                }
            }
        });
    });

    for (let i = 0; i < tanksArray.length; i++) {
        for (let j = i + 1; j < tanksArray.length; j++) {
            let t1 = tanksArray[i];
            let t2 = tanksArray[j];
            if (t1.dead || t2.dead) continue;
            
            let dx = t1.x - t2.x;
            let dy = t1.y - t2.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < t1.radius + t2.radius) {
                let angle = Math.atan2(dy, dx);
                let force = 2;
                t1.vx += Math.cos(angle) * force; t1.vy += Math.sin(angle) * force;
                t2.vx -= Math.cos(angle) * force; t2.vy -= Math.sin(angle) * force;
                
                const now = performance.now();
                if (canDealBodyDamage(t1, t2, now) && canDealBodyDamage(t2, t1, now)) {
                    let t1Dmg = getBodyDamageValue(t1);
                    let t2Dmg = getBodyDamageValue(t2);
                    
                    t1.hp -= t2Dmg;
                    t2.hp -= t1Dmg;
                    t1.lastDamageTime = now; 
                    t2.lastDamageTime = now; 
                }

                if (t1 === player || t2 === player) player.lastCombatTime = performance.now();

                if (t1.hp <= 0 && !t1.dead) { 
                    t1.dead = true; 
                    t2.addXp(Math.max(Math.floor(t1.score), 50)); 
                    if (t2 === player) {
                        globalData.gems += 100;
                        saveGameData();
                        updateUI();
                        showKillMessage(t1.name);
                    }
                }
                if (t2.hp <= 0 && !t2.dead) { 
                    t2.dead = true; 
                    t1.addXp(Math.max(Math.floor(t2.score), 50)); 
                    if (t1 === player) {
                        globalData.gems += 100;
                        saveGameData();
                        updateUI();
                        showKillMessage(t2.name);
                    }
                }
            }
        }
    }

    shapes.forEach(s => {
        bullets.forEach(b => {
            if(b.dead) return;
            if(b.hitEntities.has(s)) return;

            let dx = s.x - b.x; let dy = s.y - b.y;
            if(Math.sqrt(dx*dx + dy*dy) < s.radius + b.radius) {
                s.hp -= b.damage; 
                b.pen -= 1; 
                b.hitEntities.add(s);
                
                if (b.owner === player) player.lastCombatTime = performance.now();

                if(b.pen <= 0) b.dead = true;
                
                if(s.hp <= 0 && !s.dead) {
                    s.dead = true;
                    b.owner.addXp(s.xpValue);
                    if (b.owner === player) updateUI();
                }
            }
        });

        tanksArray.forEach(tank => {
            let pdx = s.x - tank.x; let pdy = s.y - tank.y;
            let pDist = Math.sqrt(pdx*pdx + pdy*pdy);
            if(pDist < s.radius + tank.radius) {
                const now = performance.now();
                if (canDealBodyDamage(tank, s, now)) {
                    let pDmg = getBodyDamageValue(tank);
                    s.hp -= pDmg;
                    tank.hp -= Math.max(1, Math.round(pDmg * 0.18));
                    tank.lastDamageTime = now; 
                }

                if (tank === player) player.lastCombatTime = performance.now();
                
                tank.vx -= pdx*0.1; tank.vy -= pdy*0.1;

                if(s.hp <= 0 && !s.dead) {
                    s.dead = true; tank.addXp(s.xpValue);
                    if (tank === player) updateUI();
                }
            }
        });
    });

    for (let i = 0; i < bullets.length; i++) {
        for (let j = i + 1; j < bullets.length; j++) {
            let b1 = bullets[i]; let b2 = bullets[j];
            if (!b1.dead && !b2.dead && b1.owner !== b2.owner) {
                let dx = b1.x - b2.x; let dy = b1.y - b2.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < b1.radius + b2.radius) {
                    let b1Pen = b1.pen;
                    let b2Pen = b2.pen;
                    
                    b1.pen -= b2Pen;
                    b2.pen -= b1Pen;
                    
                    if (b1.pen <= 0) b1.dead = true;
                    if (b2.pen <= 0) b2.dead = true;
                }
            }
        }
    }
}

function update() {
    let activeTanks = [];

    if (netChannel && Date.now() - lastNetCleanup > 2000) {
        lastNetCleanup = Date.now();
        for (const [id, tank] of remotePlayers.entries()) {
            if (tank.dead || (tank.lastSeen && Date.now() - tank.lastSeen > 6000)) {
                remotePlayers.delete(id);
            }
        }
    }
    
    if (gameState === 'PLAYING') {
        player.update();
        if (player.dead) {
            if (player.score > globalData.highScore) {
                globalData.highScore = Math.floor(player.score);
            }

            globalData.savedTank = null; 
            saveGameData();

            stopNetworkSession();
            gameState = 'START';
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('action-message').style.display = 'none';
        } else {
            activeTanks.push(player);
            camera.x += (player.x - camera.x) * 0.1;
            camera.y += (player.y - camera.y) * 0.1;
        }
    } else {
        camera.x += 2; camera.y += 1;
        if(camera.x > MAP_SIZE/2) camera.x = -MAP_SIZE/2;
        if(camera.y > MAP_SIZE/2) camera.y = -MAP_SIZE/2;
    }

    remotePlayers.forEach(remote => {
        if (!remote.dead) activeTanks.push(remote);
    });

    bullets.forEach(b => b.update());
    bullets = bullets.filter(b => !b.dead);

    shapes.forEach(s => s.update());
    
    checkCollisions(activeTanks);
    
    shapes = shapes.filter(s => !s.dead);
    while(shapes.length < MAX_SHAPES) spawnShape();

}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(canvas.width/2 - camera.x, canvas.height/2 - camera.y);
    
    ctx.fillStyle = '#e5e5e5';
    ctx.fillRect(-MAP_SIZE/2, -MAP_SIZE/2, MAP_SIZE, MAP_SIZE);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 5;
    ctx.strokeRect(-MAP_SIZE/2, -MAP_SIZE/2, MAP_SIZE, MAP_SIZE);

    const padding = 100;
    const viewLeft = camera.x - canvas.width/2 - padding;
    const viewRight = camera.x + canvas.width/2 + padding;
    const viewTop = camera.y - canvas.height/2 - padding;
    const viewBottom = camera.y + canvas.height/2 + padding;

    shapes.forEach(s => { if(s.x > viewLeft && s.x < viewRight && s.y > viewTop && s.y < viewBottom) s.draw(ctx); });
    bullets.forEach(b => { if(b.x > viewLeft && b.x < viewRight && b.y > viewTop && b.y < viewBottom) b.draw(ctx); });
    remotePlayers.forEach(r => { if(!r.dead && r.x > viewLeft && r.x < viewRight && r.y > viewTop && r.y < viewBottom) r.draw(ctx); });
    
    if (gameState === 'PLAYING' && !player.dead) player.draw(ctx);
    
    ctx.restore();

    if (gameState === 'PLAYING') {
        const mmSize = 120;
        const mmX = canvas.width - mmSize - 20;
        const mmY = canvas.height - mmSize - 20;
        
        ctx.fillStyle = 'rgba(200, 200, 200, 0.6)';
        ctx.fillRect(mmX, mmY, mmSize, mmSize);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 3;
        ctx.strokeRect(mmX, mmY, mmSize, mmSize);
        
        ctx.fillStyle = '#e74c3c'; 
        bots.forEach(b => {
            if (!b.dead) {
                let bx = ((b.x + MAP_SIZE/2) / MAP_SIZE) * mmSize;
                let by = ((b.y + MAP_SIZE/2) / MAP_SIZE) * mmSize;
                ctx.beginPath();
                ctx.arc(mmX + bx, mmY + by, 2, 0, Math.PI*2);
                ctx.fill();
            }
        });
        remotePlayers.forEach(r => {
            if (!r.dead) {
                let rx = ((r.x + MAP_SIZE/2) / MAP_SIZE) * mmSize;
                let ry = ((r.y + MAP_SIZE/2) / MAP_SIZE) * mmSize;
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath();
                ctx.arc(mmX + rx, mmY + ry, 3, 0, Math.PI*2);
                ctx.fill();
            }
        });

        if (!player.dead) {
            let px = ((player.x + MAP_SIZE/2) / MAP_SIZE) * mmSize;
            let py = ((player.y + MAP_SIZE/2) / MAP_SIZE) * mmSize;
            ctx.fillStyle = '#2d3436'; 
            ctx.beginPath();
            ctx.arc(mmX + px, mmY + py, 4, 0, Math.PI*2);
            ctx.fill();
        }
    }
}

function loop() {
    update(); draw(); requestAnimationFrame(loop);
}

loop();
</script>
